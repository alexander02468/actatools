name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"

          cp "target/${{ matrix.target }}/release/acta-records" \
             "dist/acta-records-${VERSION}-${{ matrix.target }}"

          cp "target/${{ matrix.target }}/release/acta-study" \
             "dist/acta-study-${VERSION}-${{ matrix.target }}"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $version = "${env:GITHUB_REF_NAME}"

          Copy-Item `
            "target/${{ matrix.target }}/release/acta-records.exe" `
            "dist/acta-records-$version-${{ matrix.target }}.exe"

          Copy-Item `
            "target/${{ matrix.target }}/release/acta-study.exe" `
            "dist/acta-study-$version-${{ matrix.target }}.exe"
